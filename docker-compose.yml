version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: collabdocs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - collab_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - collab_network

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/collabdocs?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey
      - JWT_REFRESH_SECRET=supersecretrefreshkey
      - PORT=5000
    depends_on:
      - postgres
      - redis
    networks:
      - collab_network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - collab_network

volumes:
  postgres_data:

networks:
  collab_network:
